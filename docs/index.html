<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Numbers</title>
  </head>
  <body>
    <h1>20 Random Numbers Greater Than 14</h1>
    <ul id="randomNumbers"></ul>
    <script>
      // Function to generate random numbers greater than 14
      function generateRandomNumbers() {
        const numbers = [];
        for (let i = 0; i < 20; i++) {
          // Generate a random number greater than 14
          const randomNum = Math.floor(Math.random() * (100 - 15)) + 15; // Range: 15 to 99
          numbers.push(randomNum);
        }
        return numbers;
      }
      // Display the numbers in the HTML
      const randomNumbersList = document.getElementById("randomNumbers");
      const randomNumbers = generateRandomNumbers();
      randomNumbers.forEach((num) => {
        const listItem = document.createElement("li");
        listItem.textContent = num;
        randomNumbersList.appendChild(listItem);
      });
    </script>
  </body>
</html>
